[pytest]
testpaths = solutions
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --durations=10

markers =
    slow: mark test as slow running
    easy: LeetCode easy difficulty
    medium: LeetCode medium difficulty
    hard: LeetCode hard difficulty
    arrays: array problems
    strings: string problems
    trees: tree problems
    graphs: graph problems
    dp: dynamic programming
    linked_lists: linked list problems
